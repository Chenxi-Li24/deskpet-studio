[env:esp32-s3-deskpet]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.psram_type = qspi
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = dio
board_build.filesystem = littlefs
board_build.partitions = no_ota_8mb.csv

build_flags =
    -DCORE_DEBUG_LEVEL=4
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1

build_src_filter =
    +<*>
    -<buddies/>
    -<ble_bridge.cpp>
    -<buddy.cpp>
    -<character.cpp>
    -<data.cpp>
    -<hw/imu.cpp>
    -<hw/espnow_bridge.cpp>

lib_deps =
    ; 显示驱动 (ST7789V SPI) — pinned for Arduino core 3.20017 compat
    moononournation/GFX Library for Arduino @ ~1.4.7
    ; GIF 解码
    bitbank2/AnimatedGIF @ ^2.1.1
    ; JSON 解析
    bblanchon/ArduinoJson @ ^7.0.0
    ; IMU MPU6050
    adafruit/Adafruit MPU6050
    adafruit/Adafruit BusIO
    ; 触摸 CST816T (GitHub direct, not in PIO registry)
    ; (CST8XX 暂时禁用 — 测试用不到触摸)
    ; https://github.com/adafruit/Adafruit_CST8XX_Library
    ; WS2812 RGB LED
    adafruit/Adafruit NeoPixel @ ^1.12.0
