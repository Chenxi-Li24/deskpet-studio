<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: file:">
<title>Sessions</title>
<link rel="stylesheet" href="design-tokens.css">
<style>
* { box-sizing: border-box; }

/* ── Inherit from design-tokens.css; override only what differs ── */
:root {
  --running:     var(--color-success);
  --done:        var(--color-text-tertiary);
  --interrupted: var(--color-warning);
  --idle:        var(--color-text-tertiary);
}

html, body {
  height: 100%; margin: 0;
  background: var(--color-surface-1);
  color: var(--color-text-primary);
  font-family: var(--font-sans);
  font-size: var(--text-base);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
body { user-select: none; }

.app {
  display: flex; flex-direction: column;
  height: 100vh; min-width: 0;
}

/* ── Header with glass finish ── */
.header {
  flex: 0 0 auto;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--color-border);
  background: var(--color-glass-bg);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
}

.title-row {
  display: flex; align-items: baseline; gap: 10px; min-width: 0;
}
h1 {
  margin: 0; font-size: var(--text-lg); line-height: 1.2;
  font-weight: 700; letter-spacing: var(--tracking-tight);
}
.count {
  color: var(--color-text-secondary); font-size: var(--text-sm); font-weight: 600;
}

.content {
  flex: 1 1 auto; overflow-y: auto; min-height: 0;
  padding: var(--space-7) var(--space-8) var(--space-8);
}

.group { margin: 0 0 18px; }
.group-title {
  display: flex; align-items: center; gap: 8px;
  margin: 0 0 8px; padding: 0 2px;
  color: var(--color-text-secondary);
  font-size: var(--text-sm); font-weight: 700;
  text-transform: uppercase; letter-spacing: var(--tracking-label);
}
.cards { display: flex; flex-direction: column; gap: 8px; }

/* ── Session card with glass + hover lift ── */
.card {
  position: relative;
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr) auto;
  gap: 10px; align-items: center;
  width: 100%; min-height: 86px; padding: var(--space-5);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: var(--color-surface-0);
  transition: transform 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out),
              border-color 0.25s var(--ease-out);
  animation: cardIn 0.35s var(--ease-spring) backwards;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--color-border-strong);
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.session-id-badge {
  position: absolute; top: 8px; right: 38px;
  font-family: var(--font-mono); font-size: var(--text-sm);
  color: var(--color-text-tertiary); pointer-events: none;
}

.agent-icon, .agent-fallback {
  width: 28px; height: 28px; border-radius: var(--radius-md); flex: 0 0 auto;
}
.agent-icon   { object-fit: contain; background: var(--color-surface-2); }
.agent-fallback {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--color-surface-2); color: var(--color-text-secondary);
  font-weight: 700; font-size: var(--text-sm);
}

.main { min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.session-title {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  margin-bottom: 2px; font-weight: 700; line-height: var(--leading-normal);
  color: var(--color-text-primary);
}
.session-title-input {
  width: 100%; min-width: 0; height: 22px; margin: -2px 0 0;
  padding: 1px 5px; border: 1px solid var(--color-accent);
  border-radius: var(--radius-sm); outline: none;
  background: var(--color-surface-2); color: var(--color-text-primary);
  font: inherit; font-weight: 700; line-height: var(--leading-normal);
  user-select: text;
}
.meta, .path, .event-row {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: var(--color-text-secondary); font-size: var(--text-sm);
  line-height: var(--leading-normal);
}
.path { color: var(--color-text-tertiary); }

.badge   { display: inline-flex; align-items: center; gap: 5px; }
.dot     { width: 7px; height: 7px; border-radius: 50%; background: var(--idle); }
.badge-running .dot      { background: var(--running); }
.badge-done .dot         { background: var(--done); }
.badge-interrupted .dot  { background: var(--interrupted); }
.badge-idle .dot         { background: var(--idle); }

.actions { display: flex; justify-content: flex-end; gap: 6px; }

button {
  min-width: 82px; height: 30px; border: 1px solid transparent;
  border-radius: var(--radius-md); background: var(--color-accent);
  color: #ffffff; font: inherit; font-size: var(--text-sm);
  font-weight: 700; cursor: pointer; padding: 0 var(--space-4);
  transition: background 0.15s var(--ease-out), transform 0.12s var(--ease-out);
}
button:hover:not(:disabled) { background: var(--color-accent-hover); }
button:active:not(:disabled) { transform: scale(0.96); }
button:disabled {
  cursor: default; opacity: 0.45;
  background: var(--color-surface-2); color: var(--color-text-secondary);
  border-color: var(--color-border);
}

.mark-read-button {
  background: var(--color-surface-2); color: var(--color-text-primary);
  border-color: var(--color-border);
}
.mark-read-button:hover:not(:disabled) {
  background: var(--color-accent); color: #ffffff; border-color: transparent;
}

.hide-session-button {
  position: absolute; top: 5px; right: 8px;
  min-width: 22px; width: 22px; height: 22px; padding: 0;
  border-color: transparent; border-radius: var(--radius-sm);
  background: transparent; color: var(--color-text-tertiary);
  font-size: 17px; font-weight: 500; line-height: 20px;
  transition: background 0.15s var(--ease-out), color 0.15s var(--ease-out);
}
.hide-session-button:hover:not(:disabled) {
  background: var(--color-surface-2); color: var(--color-text-primary);
}

/* ── Empty state ── */
.empty {
  height: 100%; min-height: 280px;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center; text-align: center;
  color: var(--color-text-secondary); gap: 6px; padding: var(--space-9);
}
.empty-title {
  color: var(--color-text-primary); font-weight: 700; font-size: var(--text-md);
}
.empty-hint {
  max-width: 260px; line-height: var(--leading-normal);
  color: var(--color-text-secondary);
}
.hidden { display: none !important; }

@media (max-width: 420px) {
  .header  { padding: var(--space-7) var(--space-7) var(--space-5); }
  .content { padding: var(--space-5); }
  .card    { grid-template-columns: 28px minmax(0, 1fr); }
  .actions { grid-column: 2; justify-content: flex-start; }
}
</style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="title-row">
        <h1 id="title">Sessions</h1>
        <span id="count" class="count"></span>
      </div>
    </header>
    <main id="content" class="content" aria-live="polite"></main>
  </div>
  <script src="./dashboard-renderer.js"></script>
</body>
</html>
